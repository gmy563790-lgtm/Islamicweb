<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head link rel="icon" type="image/x-icon" href="favicon.ico"> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسلم - تطبيقك اليومي</title>
<style>
:root{--bg:linear-gradient(135deg,#07110c,#12281d);--card:rgba(255,255,255,.06);--accent:#4c7e62;--text:#f0f4f2}
*{box-sizing:border-box;font-family:system-ui}
body{margin:0;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
.sidebar{width:70px;background:rgba(0,0,0,.35);display:flex;flex-direction:column;align-items:center;padding:15px}
.menu{width:45px;height:45px;margin:10px 0;display:flex;align-items:center;justify-content:center;border-radius:12px;cursor:pointer}
.menu.active{background:rgba(255,255,255,.15)}
.main{flex:1;display:flex;flex-direction:column}
.top{display:flex;justify-content:space-between;padding:12px;background:rgba(0,0,0,.25)}
.screen{display:none;padding:15px;overflow:auto;height:100%}.screen.active{display:block}
.card{background:var(--card);padding:15px;border-radius:12px;margin-bottom:10px}
.btn{padding:10px 15px;background:var(--accent);border:none;color:#fff;border-radius:10px;cursor:pointer;margin:5px}
input,select{width:100%;padding:10px;border-radius:8px;border:none;margin:5px 0}
.circle{width:220px;height:220px;border-radius:50%;border:8px solid var(--accent);display:flex;align-items:center;justify-content:center;margin:20px auto;font-size:32px;font-weight:bold}
</style>
</head>
<body>
<div class="sidebar">
<div class="menu active" onclick="nav('home',this)">🏠</div>
<div class="menu" onclick="nav('prayers',this)">🕌</div>
<div class="menu" onclick="nav('adhkar',this)">📖</div>
<div class="menu" onclick="nav('tasks',this)">📝</div>
<div class="menu" onclick="nav('pomodoro',this)">⏱️</div>
<div class="menu" onclick="nav('settings',this)">⚙️</div>
</div>
<div class="main">
<div class="top"><div>🌙 مسلم</div><div>⭐ XP: <span id="xp">0</span> | Level: <span id="level">1</span></div></div>

<div id="home" class="screen active"><div class="card"><h3>👋 أهلاً بك في تطبيق مسلم</h3><p>حيث الإنجاز وتحقيق الأماني والعمل بجد لمستقبل أفضل</p></div><div id="dailyChallengeBox"></div></div>
<div id="prayers" class="screen"><div class="card"><h3>🕌 الصلوات</h3><div id="prayerList"></div></div></div>
<div id="adhkar" class="screen"><div class="card"><h3>📖 الأذكار</h3><button class="btn" onclick="showMorning()">☀️ الصباح</button><button class="btn" onclick="showEvening()">🌙 المساء</button><div id="adhkarBox"></div></div></div>
<div id="tasks" class="screen"><div class="card"><h3>📝 المهام</h3><input id="taskInput"><button class="btn" onclick="addTask()">إضافة</button><div id="taskList"></div></div></div>
<div id="pomodoro" class="screen"><div class="card"><h3>⏱️ تقنية البومودورو</h3><label>مدة التركيز</label><input type="number" id="focusTime" value="25"><label>مدة الراحة</label><input type="number" id="breakTime" value="5"><div class="circle"><span id="timerDisplay">25:00</span></div><button class="btn" onclick="startPomodoro()">ابدأ</button><button class="btn" onclick="pausePomodoro()">إيقاف</button><button class="btn" onclick="resetPomodoro()">إعادة</button></div></div>
<div id="settings" class="screen"><div class="card"><h3>⚙️ الإعدادات</h3><select id="color"><option value="#4c7e62">أخضر</option><option value="#3b82f6">أزرق</option><option value="#ef4444">أحمر</option></select><button class="btn" onclick="saveSettings()">حفظ</button></div></div>
</div>

<div style="position:fixed;bottom:10px;left:10px;font-size:12px;opacity:.7">Made by Gamal Nasser</div>

<script>
let xp=+localStorage.getItem("xp")||0, level=+localStorage.getItem("level")||1;
let prayers=JSON.parse(localStorage.getItem("prayers"))||{Fajr:false,Dhuhr:false,Asr:false,Maghrib:false,Isha:false};
let tasks=JSON.parse(localStorage.getItem("tasks"))||[];
let adhkarState=JSON.parse(localStorage.getItem("adhkarState"))||{};

const morningAdhkar=["أصبحنا وأصبح الملك لله","اللهم بك أصبحنا وبك أمسينا","سبحان الله وبحمده","أستغفر الله","لا إله إلا الله"];
const eveningAdhkar=["أمسينا وأمسى الملك لله","اللهم بك أمسينا","أعوذ بكلمات الله","حسبي الله","أستغفر الله"];

function clickSound(){try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.value=500;g.gain.setValueAtTime(.015,c.currentTime);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+.12);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.12);}catch(e){}}

function update(){xp=Math.max(0,xp);document.getElementById("xp").textContent=xp;if(xp>=level*100){level++;alert("🔥 Level Up!")}document.getElementById("level").textContent=level;localStorage.setItem("xp",xp);localStorage.setItem("level",level);}
function renderPrayers(){let b=document.getElementById("prayerList");b.innerHTML="";Object.keys(prayers).forEach(p=>b.innerHTML+=`<div class="card" onclick="togglePrayer('${p}')">${p} ${prayers[p]?"✔":""}</div>`);}
function togglePrayer(p){prayers[p]=!prayers[p];xp+=prayers[p]?20:-20;save();update();renderPrayers();}
function renderAdhkar(list,type){let b=document.getElementById("adhkarBox");b.innerHTML="";list.forEach((t,i)=>{let k=type+"_"+i,d=adhkarState[k];b.innerHTML+=`<div class="card" onclick="toggleAdhkar('${k}')" style="${d?'background:#2e5c45':''}">${t} ${d?'✔ (+5 XP)':''}</div>`})}
function showMorning(){renderAdhkar(morningAdhkar,"morning")}
function showEvening(){renderAdhkar(eveningAdhkar,"evening")}
function toggleAdhkar(k){adhkarState[k]=!adhkarState[k];xp+=adhkarState[k]?5:-5;localStorage.setItem("adhkarState",JSON.stringify(adhkarState));update();}
function addTask(){let v=document.getElementById("taskInput").value;if(!v)return;tasks.push({text:v,done:false});document.getElementById("taskInput").value="";xp+=5;save();update();renderTasks();}
function renderTasks(){let b=document.getElementById("taskList");b.innerHTML="";tasks.forEach((t,i)=>b.innerHTML+=`<div class="card" onclick="toggleTask(${i})">${t.text} ${t.done?"✔":""}</div>`);}
function toggleTask(i){tasks[i].done=!tasks[i].done;xp+=tasks[i].done?10:-10;save();update();renderTasks();}
function saveSettings(){document.documentElement.style.setProperty("--accent",document.getElementById("color").value);}
function save(){localStorage.setItem("prayers",JSON.stringify(prayers));localStorage.setItem("tasks",JSON.stringify(tasks));}
function nav(id,btn){clickSound();document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.querySelectorAll(".menu").forEach(m=>m.classList.remove("active"));document.getElementById(id).classList.add("active");btn.classList.add("active");}

let pomoTimer,pomoRunning=false,pomoSeconds=1500;
function updatePomodoroDisplay(){document.getElementById("timerDisplay").textContent=`${Math.floor(pomoSeconds/60)}:${String(pomoSeconds%60).padStart(2,'0')}`}
function startPomodoro(){if(pomoRunning)return;pomoRunning=true;if(pomoSeconds<=0)pomoSeconds=(+document.getElementById("focusTime").value||25)*60;pomoTimer=setInterval(()=>{if(pomoSeconds>0){pomoSeconds--;updatePomodoroDisplay()}else{clearInterval(pomoTimer);pomoRunning=false;xp+=15;update();clickSound();alert("🎉 انتهت جلسة التركيز +15 XP")}},1000)}
function pausePomodoro(){clearInterval(pomoTimer);pomoRunning=false}
function resetPomodoro(){clearInterval(pomoTimer);pomoRunning=false;pomoSeconds=(+document.getElementById("focusTime").value||25)*60;updatePomodoroDisplay()}


const dailyChallenges=["🌙 قيام الليل","❤️ بر الوالدين","🕌 صلاة الفجر في جماعة","📖 قراءة 10 صفحات من القرآن","🤲 الاستغفار 100 مرة","📿 أذكار الصباح كاملة","📿 أذكار المساء كاملة","😊 إدخال السرور على مسلم","🤝 صلة رحم","🍃 المحافظة على السنن الرواتب","💧 الوضوء لكل صلاة","💰 صدقة ولو قليلة","📚 تعلم شيء جديد عن الإسلام","🧹 مساعدة أهل البيت","🤫 حفظ اللسان من الغيبة"];
let challengeDone=localStorage.getItem("challengeDoneDate");
function getTodayChallenge(){const d=new Date();return dailyChallenges[d.getDate()%dailyChallenges.length];}
function renderChallenge(){
const today=new Date().toDateString();
const completed=challengeDone===today;
document.getElementById("dailyChallengeBox").innerHTML=`
<div class="card">
<h3>🎯 تحدي اليوم</h3>
<div class="card">${getTodayChallenge()}</div>
<button class="btn" onclick="completeChallenge()" ${completed?"disabled":""}>
${completed?"✅ تم الإنجاز":"إنجاز التحدي +50 XP"}
</button>
</div>`;
}
function completeChallenge(){
const today=new Date().toDateString();
if(challengeDone===today)return;
xp+=50;
localStorage.setItem("challengeDoneDate",today);
challengeDone=today;
update();
renderChallenge();
alert("🎉 تم إكمال تحدي اليوم +50 XP");
}

renderPrayers();renderTasks();update();updatePomodoroDisplay();renderChallenge();
</script>
</body>
</html>
